name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [main]

jobs:
  ci:
    name: 🧪 Lint, Tests y Análisis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Correr Biome
        run: npx biome ci .

      - name: Correr tests con coverage
        run: npm run test:coverage

      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: 🐳 Build y Push Docker
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexandervilla/ci-project:latest
            alexandervilla/ci-project:${{ github.sha }}

  deploy:
    name: 🚀 Deploy en Oracle
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy en servidor Oracle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 168.138.125.21
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            docker pull alexandervilla/ci-project:latest
            docker stop ci-project || true
            docker rm ci-project || true
            docker run -d -p 3000:3000 --name ci-project --restart unless-stopped alexandervilla/ci-project:latest

  notify:
    name: 📣 Notificación Slack
    runs-on: ubuntu-latest
    needs: [ci]
    if: always()

    steps:
      - name: Notificar resultado
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,job,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}